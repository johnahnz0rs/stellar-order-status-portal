<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stellar Sage → Shopify Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style> /* simple tailwind or plain CSS later */ </style>
</head>
<body>
<h1>Stellar Technical Sage ↔ Shopify Sync Tool</h1>

<div>
    <h2>1. Upload Shopify Open Orders Export</h2>
    <input type="file" id="shopifyFile" accept=".csv">
</div>
<div>
    <h2>2. Upload Sage - Line Items By Promise Date.csv</h2>
    <input type="file" id="sageLinesFile" accept=".csv">
</div>
<div>
    <h2>3. Upload Sage - Tracking Numbers.csv</h2>
    <input type="file" id="sageTrackingFile" accept=".csv">
</div>
<div>
    <h2>4. Upload Sage - Customer Contacts.csv</h2>
    <input type="file" id="sageCustomersFile" accept=".csv">
</div>

<button onclick="processAll()">Process & Generate Matrixify CSV</button>

<pre id="preview"></pre>
</body>
</html>
